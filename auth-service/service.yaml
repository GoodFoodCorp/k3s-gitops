apiVersion: v1
kind: Service
metadata:
  name: auth-service # Doit correspondre au nom du service
  namespace: goodfood-dev # Même namespace que le deployment
spec:
  type: ClusterIP
  selector:
    app: auth-service # Doit matcher le label 'app' défini dans le deployment.yaml
  ports:
    - protocol: TCP
      port: 80 # Port exposé au sein du cluster
      targetPort: 8081 # Port d'écoute du conteneur Docker
